# =============================================================================
# skimindex pipeline configuration
# =============================================================================
# Mounted read-only at /config inside the container.
# See docs/config-format.md for the full specification.
#
# Section types:
#   Configuration : [local_directories], [logging], [processed_data],
#                   [indexes], [stamp]
#   Sources       : [source.ncbi], [source.genbank], [source.internal]
#   Roles         : [role.decontamination], [role.genomes], [role.genome_skims]
#   Processing    : [processing.split], [processing.kmercount]
#   Data          : [data.<name>] — requires source + role keys
# =============================================================================


# -----------------------------------------------------------------------------
# Configuration sections (root level)
# -----------------------------------------------------------------------------

# Host-side paths for each container mount point.
# Each key <k> defines the host path that is bind-mounted to /<k> inside
# the container.  Relative paths are resolved from the project root by
# skimindex.sh.  Inside the container the path is always /<k>.
[local_directories]
genbank        = "genbank"
indexes        = "indexes"
raw_data       = "raw_data"
processed_data = "processed_data"
sra            = "sra"            # raw sequencing reads from NCBI SRA
scratch        = "scratch"        # temporary files (HPC: point to $TMPDIR or fast local storage)
config         = "config"
log            = "log"
stamp          = "stamp"
usercmd        = "usercmd"        # optional user-defined sub-commands (mounted at /usercmd)

# Logging configuration.
[logging]
directory  = "log"             # references [local_directories] key → ${SKIMINDEX_ROOT}/log/
file       = "skimindex.log"   # filename within directory
level      = "INFO"            # DEBUG | INFO | WARNING | ERROR
mirror     = true              # true → tee logs to screen AND file; false → file only
everything = true              # true → also redirect all stderr (commands, bash errors) to log

# Root location for all pipeline outputs.
[processed_data]
directory = "processed_data"   # references [local_directories] key → ${SKIMINDEX_ROOT}/processed_data/

# Root location for k-mer index storage.
[indexes]
directory = "indexes"          # references [local_directories] key → ${SKIMINDEX_ROOT}/indexes/

# Root location for stamp files used to track completed pipeline steps.
[stamp]
directory = "stamp"            # references [local_directories] key → ${SKIMINDEX_ROOT}/stamp/

# Root location for temporary files (prefetch .sra archives, fasterq-dump outputs).
# On HPC systems, point this to a fast local scratch filesystem.
[scratch]
directory = "scratch"          # references [local_directories] key → ${SKIMINDEX_ROOT}/scratch/


# -----------------------------------------------------------------------------
# Data source sections
# -----------------------------------------------------------------------------

# Data downloaded via the NCBI Datasets CLI.
[source.ncbi]
directory = "genbank"          # references [local_directories] key → ${SKIMINDEX_ROOT}/genbank/

# Data to download from GenBank (FTP/HTTPS site) as flat-files.
[source.genbank]
directory = "genbank"          # references [local_directories] key → ${SKIMINDEX_ROOT}/genbank/
divisions = ["bct", "pln"]     # divisions to download: bacteria + land plants/fungi

# Internal sequencing data produced in-house.
[source.internal]
directory = "raw_data"         # references [local_directories] key → ${SKIMINDEX_ROOT}/raw_data/

# Raw sequencing reads downloaded from NCBI SRA.
# EBI (ERR/ERS/SAMEA) and DDBJ accessions are mirrored at NCBI and supported transparently.
[source.sra]
directory = "sra"              # references [local_directories] key → ${SKIMINDEX_ROOT}/sra/


# -----------------------------------------------------------------------------
# Role sections
# -----------------------------------------------------------------------------

# Parameters for the decontamination filter role.
[role.decontamination]
directory = "decontamination"
run       = "prepare_decontam" # references [processing.prepare_decontam]

# Parameters for the complete reference genomes role.
[role.genomes]
directory = "genomes_15x"
kmer_size = 31

# Parameters for the low-coverage skim-sequenced genomes role.
[role.genome_skims]
directory = "skims"


# -----------------------------------------------------------------------------
# Processing sections
# -----------------------------------------------------------------------------

# Composite: prepare decontamination reference sequences.
# Chains split → filter_n_only → distribute atomics.
[processing.prepare_decontam]
output = "parts@decontamination"   # → processed_data/decontamination/{dataset}/parts/
steps = [
  {type = "split",         size = 200, overlap = 28},  # obiscript → STDOUT
  {type = "filter_n_only"},                             # obigrep   → STDOUT
  {type = "distribute",    batches = 24},               # obidistribute → parts/
]

# Atomic: count k-mers in prepared decontamination fragments.
[processing.count_kmers_decontam]
type      = "kmercount"
output    = "kmercount@decontamination"   # → processed_data/decontamination/{dataset}/kmercount/
sequence  = "parts@decontamination"       # reads fragments produced by prepare_decontam
kmer_size = 29
threads   = 10

# Atomic: build kmindex sub-index for one decontamination dataset.
[processing.build_index_decontam]
type      = "buildindex"
output    = "kmindex@decontamination"     # → processed_data/decontamination/{dataset}/kmindex/  (FOF + stamp)
index     = "@idx:decontamination"        # → indexes/decontamination/  (kmindex meta-index, managed by kmindex)
kmer_size = 29
zvalue    = 3      # k-mers required for a positive query result
fpr       = 1e-3   # target false positive rate
threads   = 10
verbose   = "debug"

# -----------------------------------------------------------------------------
# Data sections
# -----------------------------------------------------------------------------

# Human reference genome — single canonical assembly from RefSeq.
[data.human]
directory        = "Human"
source           = "ncbi"
role             = "decontamination"
example          = true
taxon            = "human"     # As understood by the NCBI datasets command
reference        = true
assembly_source  = "refseq"
assembly_level   = "chromosome"
assembly_version = "latest"

# Fungi sequences filtered from GenBank plant flat-files by taxid.
[data.fungi]
directory  = "Fungi"
source     = "genbank"
role       = "decontamination"
example    = true
by_species = false             # bulk flat-file source; obidistribute support planned (not yet implemented)
divisions  = ["pln"]           # subset of [source.genbank] divisions
taxid      = 4751              # NCBI TAXID based taxonomic filter: Fungi kingdom

# Bacteria sequences from GenBank bacterial flat-files.
[data.bacteria]
directory  = "Bacteria"
source     = "genbank"
role       = "decontamination"
example    = true
by_species = false             # bulk flat-file source; obidistribute support planned (not yet implemented)
divisions  = ["bct"]           # subset of [source.genbank] divisions
taxid      = 1                 # NCBI TAXID based taxonomic filter: root (all sequences)

# Spermatophyta (seed plants) — counter-examples: must NOT be filtered out.
[data.plants]
directory        = "Plants"
source           = "ncbi"
role             = "decontamination"
example          = false       # counter-example: must NOT be filtered out
taxon            = "Spermatophyta"
reference        = false
assembly_level   = "complete"
assembly_version = "latest"
one_per          = "genus"

# SRA reads — provide run accessions, biosample IDs, or both
[data.vaccinium_skims]
source     = "sra"
role       = "genome_skims"
directory  = "Vaccinum"
accessions = ["ERR7254753", "ERX6824156"]           # SRR/ERR/DRR run accessions
biosamples = ["SAMEA10885714" , "ERS8536882"]         # SAMEA/ERS/SRS biosample IDs → all associated runs fetched
threads    = 4                        # fasterq-dump parallelism

